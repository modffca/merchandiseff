<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchandise Free Fire Lantai 23</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FFF5F8; --surface: #FFFFFF; --surface2: #FFEABB; 
      --border: #FBC3C1; --border2: #FAACBF;
      --accent: #FE81D4; --accent2: #e560b8;
      --text: #1A1114; --text-muted: #6B5A5F;
      --danger: #FF4D4F; --warning: #FAAD14; --success: #FE81D4; 
      --font-head: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
      --shadow: 4px 4px 0px #FBC3C1; --shadow-hover: 8px 8px 0px #FE81D4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 15px; line-height: 1.6;
      min-height: 100vh; overflow-x: hidden;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 20px 20px; 
    }
    #app { position: relative; z-index: 1; }

    /* NAVBAR */
    .navbar {
      position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 70px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--text);
    }
    .navbar-brand { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
    .navbar-brand span { display: inline-block; width: 14px; height: 14px; background: var(--accent); border: 2px solid var(--text); }
    .navbar-actions { display: flex; align-items: center; gap: 12px; }
    .navbar-user {
      display: flex; align-items: center; gap: 10px; padding: 6px 14px; background: var(--surface2); border: 2px solid var(--text);
      font-size: 14px; font-weight: 700; text-transform: uppercase; box-shadow: 2px 2px 0px var(--text);
    }
    .navbar-user .avatar {
      width: 26px; height: 26px; background: var(--accent); border: 1px solid var(--text); display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-weight: 800; color: var(--text);
    }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 7px; padding: 10px 24px;
      font-family: var(--font-head); font-size: 14px; font-weight: 800; text-transform: uppercase; cursor: pointer; border: 2px solid var(--text);
      transition: all 0.2s ease; text-decoration: none; background: var(--surface); box-shadow: 3px 3px 0px var(--border); color: var(--text);
    }
    .btn-primary { background: var(--accent); box-shadow: 3px 3px 0px var(--text); }
    .btn-primary:hover { background: var(--accent2); transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--text); }
    .btn-ghost:hover { background: var(--surface2); box-shadow: 3px 3px 0px var(--text); }
    .btn-danger { background: var(--surface); color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: var(--surface); box-shadow: 3px 3px 0px var(--text); }
    .btn-sm { padding: 6px 12px; font-size: 12px; box-shadow: 2px 2px 0px var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* PAGES */
    .page { display: none; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* AUTH PAGE */
    .auth-page { min-height: calc(100vh - 70px); display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .auth-card { width: 100%; max-width: 420px; background: var(--surface); border: 2px solid var(--text); padding: 40px; box-shadow: 8px 8px 0px var(--border2); }
    .auth-header { margin-bottom: 30px; text-align: center; }
    .auth-header h2 { font-family: var(--font-head); font-size: 28px; font-weight: 800; text-transform: uppercase; }
    .auth-tabs { display: flex; border: 2px solid var(--text); margin-bottom: 24px; }
    .auth-tab { flex: 1; text-align: center; padding: 12px; font-family: var(--font-head); font-weight: 800; font-size: 14px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; background: var(--surface); }
    .auth-tab:first-child { border-right: 2px solid var(--text); }
    .auth-tab.active { background: var(--surface2); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; }
    .form-input { width: 100%; padding: 12px; background: var(--bg); border: 2px solid var(--text); font-family: var(--font-body); font-size: 15px; color: var(--text); outline: none; transition: box-shadow 0.2s; }
    .form-input:focus { box-shadow: 3px 3px 0px var(--accent); }
    .form-btn { width: 100%; justify-content: center; padding: 14px; font-size: 16px; margin-top: 10px; }

    /* DASHBOARD PAGE */
    .dashboard-page { padding: 40px 32px 80px; max-width: 1400px; margin: 0 auto; }
    .hero { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; padding-bottom: 20px; border-bottom: 2px dashed var(--text); }
    .hero h1 { font-family: var(--font-head); font-size: clamp(32px, 5vw, 48px); font-weight: 800; text-transform: uppercase; line-height: 1.1; text-shadow: 3px 3px 0px var(--border2); }
    .hero-stats { display: flex; gap: 12px; }
    .stat-chip { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 20px; background: var(--text); color: var(--surface); font-family: var(--font-head); font-weight: 800; text-transform: uppercase; box-shadow: 3px 3px 0px var(--border); }
    .stat-chip .val { color: var(--accent); font-size: 24px; line-height: 1; margin-bottom: 4px; }
    .stat-chip .lbl { font-size: 12px; letter-spacing: 1px; }

    /* TOOLBAR */
    .toolbar { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; align-items: stretch; }
    .search-box { flex: 1; min-width: 200px; display: flex; align-items: center; gap: 10px; background: var(--surface); border: 2px solid var(--text); padding: 0 16px; box-shadow: 3px 3px 0px var(--border); }
    .search-box input { width: 100%; padding: 14px 0; border: none; outline: none; background: transparent; font-family: var(--font-body); font-size: 15px; font-weight: 600; }
    .filter-select, .sort-select { padding: 0 16px; background: var(--surface); border: 2px solid var(--text); height: 50px; font-family: var(--font-head); font-weight: 800; text-transform: uppercase; font-size: 13px; outline: none; cursor: pointer; box-shadow: 3px 3px 0px var(--border); }

    /* GRID & CARDS */
    .merch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .merch-card { background: var(--surface); border: 2px solid var(--text); display: flex; flex-direction: column; transition: all 0.2s ease; box-shadow: var(--shadow); position: relative; }
    .merch-card:hover { transform: translateY(-4px) translate(-4px, -4px); box-shadow: var(--shadow-hover); }
    .merch-img { width: 100%; aspect-ratio: 1 / 1; background: var(--surface2); border-bottom: 2px solid var(--text); position: relative; }
    .merch-img img { width: 100%; height: 100%; object-fit: cover; }
    .merch-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--border2); }
    .merch-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
    .merch-name { font-family: var(--font-head); font-size: 18px; font-weight: 800; text-transform: uppercase; margin-bottom: auto; padding-bottom: 16px; line-height: 1.2; }
    .merch-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 2px dashed var(--border2); }
    .merch-stock { display: flex; align-items: center; gap: 6px; font-family: var(--font-head); font-size: 13px; font-weight: 800; background: var(--bg); padding: 4px 10px; border: 1px solid var(--text); }
    .merch-stock .dot { width: 8px; height: 8px; border: 1px solid var(--text); }
    .stock-ok .dot { background: var(--success); }
    .stock-low .dot { background: var(--warning); }
    .stock-empty .dot { background: var(--danger); }
    .merch-note { font-size: 12px; color: var(--text-muted); font-weight: 500; margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ADMIN ACTIONS */
    .admin-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 2px dashed var(--border2); }

    /* MODAL */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 17, 20, 0.6); backdrop-filter: blur(4px); z-index: 1000; display: none; opacity: 0; transition: opacity 0.3s; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 90%; max-width: 500px; background: var(--surface); border: 2px solid var(--text); box-shadow: 8px 8px 0px var(--border2); z-index: 1001; padding: 30px; display: none; opacity: 0; transition: all 0.3s; max-height: 90vh; overflow-y: auto; }
    .modal.active, .modal-overlay.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .modal-overlay.active { transform: none; }
    .modal-header h3 { font-family: var(--font-head); font-size: 22px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px dashed var(--border2); padding-bottom: 10px;}

    /* STATES & TOAST */
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; border: 2px dashed var(--text); background: var(--surface); }
    .empty-state h3 { font-family: var(--font-head); font-size: 20px; text-transform: uppercase; margin-bottom: 8px; }
    .loading-grid .skeleton { background: var(--surface); border: 2px solid var(--border2); height: 380px; animation: pulse 1.5s infinite alternate; }
    @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; background: var(--surface2); } }
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { padding: 16px 24px; background: var(--surface); border: 2px solid var(--text); font-family: var(--font-head); font-weight: 800; font-size: 13px; text-transform: uppercase; box-shadow: 4px 4px 0px var(--text); display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: none; } }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>

<div id="app">
  <nav class="navbar">
    <div class="navbar-brand"><span></span> MerchSpace</div>
    <div class="navbar-actions" id="navbar-actions"></div>
  </nav>

  <div class="page active" id="page-auth">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header"><h2 id="auth-title">Selamat Datang</h2></div>
        <div class="auth-tabs">
          <div class="auth-tab active" onclick="switchAuthTab('login')">Masuk</div>
          <div class="auth-tab" onclick="switchAuthTab('register')">Daftar</div>
        </div>

        <div id="form-login">
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="login-email" placeholder="nama@email.com" /></div>
          <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="login-password" placeholder="••••••••" /></div>
          <button class="btn btn-primary form-btn" onclick="handleLogin()" id="btn-login">Masuk</button>
        </div>

        <div id="form-register" style="display:none">
          <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" class="form-input" id="reg-nama" placeholder="Nama kamu" /></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="reg-email" placeholder="nama@email.com" /></div>
          <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="reg-password" placeholder="Min. 6 karakter" /></div>
          <div class="form-group"><label class="form-label">Nomor Telepon</label><input type="tel" class="form-input" id="reg-telp" placeholder="08xxxxxxxxxx" /></div>
          <button class="btn btn-primary form-btn" onclick="handleRegister()" id="btn-register">Buat Akun</button>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="page-dashboard">
    <div class="dashboard-page">
      <div class="hero">
        <h1>Merchandise Free Fire Lantai 23</h1>
        <div class="hero-stats">
          <div class="stat-chip"><div class="val" id="stat-total">—</div><div class="lbl">TOTAL ITEM</div></div>
          <div class="stat-chip"><div class="val" id="stat-available">—</div><div class="lbl">TERSEDIA</div></div>
        </div>
      </div>

      <div class="toolbar" id="main-toolbar">
        <div class="search-box">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="CARI MERCHANDISE..." oninput="applyFilters()" />
        </div>
        <select class="filter-select" id="filter-jenis" onchange="applyFilters()"><option value="">SEMUA JENIS</option></select>
        <select class="sort-select" id="sort-by" onchange="applyFilters()">
          <option value="newest">TERBARU</option><option value="name-asc">NAMA A–Z</option><option value="name-desc">NAMA Z–A</option><option value="stock-asc">STOK SEDIKIT</option><option value="stock-desc">STOK BANYAK</option>
        </select>
        </div>

      <div class="loading-grid merch-grid" id="loading-state"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>
      <div class="merch-grid" id="merch-grid" style="display:none"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
<div class="modal" id="modal-form">
  <div class="modal-header"><h3 id="modal-title">Tambah Item</h3></div>
  <div class="modal-body">
     <input type="hidden" id="form-id">
     <div class="form-group"><label class="form-label">Nama Barang</label><input class="form-input" id="form-nama"></div>
     <div class="form-group"><label class="form-label">Kategori</label><input class="form-input" id="form-jenis" placeholder="Contoh: Baju, Totebag"></div>
     <div class="form-group"><label class="form-label">Total Stok</label><input type="number" class="form-input" id="form-qty"></div>
     <div class="form-group"><label class="form-label">Link Foto</label><input class="form-input" id="form-foto" placeholder="Direct link gambar (Opsional)"></div>
     <div class="form-group"><label class="form-label">Catatan Tambahan</label><input class="form-input" id="form-note" placeholder="Opsional"></div>
  </div>
  <div style="display:flex;gap:10px;margin-top:24px;">
     <button class="btn btn-ghost" onclick="closeModal()" style="flex:1;">BATAL</button>
     <button class="btn btn-primary" onclick="saveMerch()" id="btn-save-merch" style="flex:1;">SIMPAN</button>
  </div>
</div>

<div id="toast-container"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbye8KOyKjzVmqTeEJWENdcfemRSNDPIcho1JzX02Gh2_lQhgmL4JnLbAuHLfg_udAT5/exec';

  let currentUser = null;
  let allMerchandise = [];

  document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('merch_user');
    if (saved) { currentUser = JSON.parse(saved); goToDashboard(); } 
    else { showPage('auth'); }
  });

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
  }

  function goToDashboard() { showPage('dashboard'); renderNavbar(); loadMerchandise(); }

  function renderNavbar() {
    const el = document.getElementById('navbar-actions');
    if (currentUser) {
      el.innerHTML = `
        <div class="navbar-user">
          <div class="avatar">${currentUser.nama.charAt(0).toUpperCase()}</div>
          <span>${currentUser.nama.split(' ')[0]}</span>
          ${currentUser.role === 'admin' ? '<span style="font-size:11px;background:#FE81D4;color:#fff;padding:2px 8px;border:1px solid #1A1114">ADMIN</span>' : ''}
        </div>
        <button class="btn btn-ghost" onclick="handleLogout()" style="font-size:13px;padding:7px 14px">KELUAR</button>
      `;
    } else { el.innerHTML = `<button class="btn btn-primary" onclick="showPage('auth')">Masuk</button>`; }
  }

  function renderAdminToolbar() {
    const toolbar = document.getElementById('main-toolbar');
    let btn = document.getElementById('btn-add-merch');
    if (currentUser && currentUser.role === 'admin') {
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'btn-add-merch'; btn.className = 'btn btn-primary'; btn.innerHTML = '+ TAMBAH ITEM';
        btn.onclick = () => openModal();
        toolbar.appendChild(btn);
      }
    } else if (btn) { btn.remove(); }
  }

  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    const idx = tab === 'login' ? 0 : 1;
    document.querySelectorAll('.auth-tab')[idx].classList.add('active');
    document.getElementById('form-login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('auth-title').textContent = tab === 'login' ? 'Selamat Datang' : 'Buat Akun';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showToast('Isi email dan password dulu ya!', 'error'); return; }
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Memproses...';
    try {
      const res = await apiPost({ action: 'login', email, password });
      if (res.success) {
        currentUser = res.user; localStorage.setItem('merch_user', JSON.stringify(currentUser));
        showToast(`Selamat datang, ${currentUser.nama}! 👋`, 'success'); goToDashboard();
      } else { showToast(res.message || 'Login gagal', 'error'); }
    } catch (e) { showToast('Koneksi gagal. Cek URL API kamu.', 'error'); }
    btn.disabled = false; btn.textContent = 'Masuk';
  }

  async function handleRegister() {
    const nama = document.getElementById('reg-nama').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const no_telp = document.getElementById('reg-telp').value.trim();
    if (!nama || !email || !password) { showToast('Nama, email, dan password wajib diisi!', 'error'); return; }
    if (password.length < 6) { showToast('Password minimal 6 karakter', 'error'); return; }
    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = 'Mendaftarkan...';
    try {
      const res = await apiPost({ action: 'register', nama, email, password, no_telp });
      if (res.success) {
        showToast('Akun berhasil dibuat! Silakan masuk.', 'success');
        switchAuthTab('login'); document.getElementById('login-email').value = email;
      } else { showToast(res.message || 'Registrasi gagal', 'error'); }
    } catch (e) { showToast('Koneksi gagal. Cek URL API kamu.', 'error'); }
    btn.disabled = false; btn.textContent = 'Buat Akun';
  }

  function handleLogout() { currentUser = null; localStorage.removeItem('merch_user'); showToast('Sampai jumpa! 👋', 'info'); showPage('auth'); renderNavbar(); }

  async function loadMerchandise() {
    document.getElementById('loading-state').style.display = 'grid';
    document.getElementById('merch-grid').style.display    = 'none';
    try {
      const res = await apiGet('getMerchandise');
      if (res.success) {
        allMerchandise = res.data || [];
        populateJenisFilter(allMerchandise); updateStats(allMerchandise); applyFilters(); renderAdminToolbar();
      } else { showToast('Gagal memuat data', 'error'); }
    } catch (e) { showToast('Koneksi ke API gagal', 'error'); }
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('merch-grid').style.display    = 'grid';
  }

  function populateJenisFilter(items) {
    const jenis = [...new Set(items.map(i => i.jenis).filter(Boolean))].sort();
    const sel   = document.getElementById('filter-jenis');
    sel.innerHTML = '<option value="">SEMUA JENIS</option>';
    jenis.forEach(j => { const opt = document.createElement('option'); opt.value = j; opt.textContent = j; sel.appendChild(opt); });
  }

  function updateStats(items) {
    document.getElementById('stat-total').textContent     = items.length;
    document.getElementById('stat-available').textContent = items.filter(i => parseInt(i.qty) > 0).length;
  }

  function applyFilters() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const jenis = document.getElementById('filter-jenis').value;
    const sortBy = document.getElementById('sort-by').value;

    let filtered = allMerchandise.filter(item => {
      const matchSearch = !q || item.nama?.toLowerCase().includes(q) || item.jenis?.toLowerCase().includes(q) || item.note?.toLowerCase().includes(q);
      const matchJenis = !jenis || item.jenis === jenis;
      return matchSearch && matchJenis;
    });

    filtered = [...filtered].sort((a, b) => {
      if (sortBy === 'name-asc')   return (a.nama || '').localeCompare(b.nama || '');
      if (sortBy === 'name-desc')  return (b.nama || '').localeCompare(a.nama || '');
      if (sortBy === 'stock-asc')  return parseInt(a.qty) - parseInt(b.qty);
      if (sortBy === 'stock-desc') return parseInt(b.qty) - parseInt(a.qty);
      return new Date(b.last_update || 0) - new Date(a.last_update || 0);
    });
    renderGrid(filtered);
  }

  function renderGrid(items) {
    const grid = document.getElementById('merch-grid');
    if (items.length === 0) { grid.innerHTML = `<div class="empty-state"><h3>KOSONG</h3><p>Tidak ada merchandise yang cocok dengan filter kamu.</p></div>`; return; }

    grid.innerHTML = items.map(item => {
      const qty = parseInt(item.qty) || 0;
      const stockCls = qty === 0 ? 'stock-empty' : qty <= 5 ? 'stock-low' : 'stock-ok';
      const stockLbl = qty === 0 ? 'Stok Habis' : qty <= 5 ? `Sisa ${qty}` : `${qty} unit`;
      const imgHtml = item.foto_url ? `<img src="${item.foto_url}" loading="lazy" alt="${item.nama}" onerror="this.parentElement.innerHTML='<div class=\\'merch-img-placeholder\\'>📦</div>'" />` : `<div class="merch-img-placeholder">📦</div>`;

      // Jika role admin, suntikkan tombol Edit & Hapus
      const adminActions = (currentUser && currentUser.role === 'admin') ? `
        <div class="admin-actions">
          <button class="btn btn-ghost btn-sm" style="flex:1" onclick="openModal('${item.id}')">EDIT</button>
          <button class="btn btn-danger btn-sm" style="flex:1" onclick="deleteMerch('${item.id}')">HAPUS</button>
        </div>
      ` : '';

      return `
        <div class="merch-card">
          <div class="merch-img">${imgHtml}</div>
          <div class="merch-body">
            <div class="merch-name">${item.nama || 'Tanpa Nama'}</div>
            <div class="merch-meta">
              <div class="merch-stock ${stockCls}"><div class="dot"></div>${stockLbl}</div>
            </div>
            ${item.note ? `<div class="merch-note">${item.note}</div>` : ''}
            ${adminActions}
          </div>
        </div>
      `;
    }).join('');
  }

  // MODAL LOGIC (ADD / EDIT)
  function openModal(id = null) {
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('modal-form').classList.add('active');
    
    if (id) {
      document.getElementById('modal-title').textContent = 'EDIT ITEM';
      const item = allMerchandise.find(i => i.id === id);
      document.getElementById('form-id').value = item.id;
      document.getElementById('form-nama').value = item.nama;
      document.getElementById('form-jenis').value = item.jenis;
      document.getElementById('form-qty').value = item.qty;
      document.getElementById('form-foto').value = item.foto_url;
      document.getElementById('form-note').value = item.raw_note || ''; // Ambil note mentah tanpa tambahan info Size
    } else {
      document.getElementById('modal-title').textContent = 'TAMBAH ITEM';
      document.getElementById('form-id').value = '';
      document.getElementById('form-nama').value = '';
      document.getElementById('form-jenis').value = '';
      document.getElementById('form-qty').value = '0';
      document.getElementById('form-foto').value = '';
      document.getElementById('form-note').value = '';
    }
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('modal-form').classList.remove('active');
  }

  async function saveMerch() {
    const id = document.getElementById('form-id').value;
    const nama = document.getElementById('form-nama').value.trim();
    const jenis = document.getElementById('form-jenis').value.trim();
    const qty = document.getElementById('form-qty').value;
    const foto_url = document.getElementById('form-foto').value.trim();
    const note = document.getElementById('form-note').value.trim();

    if (!nama || !jenis) { showToast('Nama dan Kategori wajib diisi!', 'error'); return; }

    const btn = document.getElementById('btn-save-merch');
    btn.disabled = true; btn.textContent = 'MENYIMPAN...';
    
    const action = id ? 'updateMerchandise' : 'createMerchandise';
    try {
      const res = await apiPost({ action, id, nama, jenis, qty, foto_url, note });
      if (res.success) {
        showToast(res.message, 'success'); closeModal(); loadMerchandise();
      } else { showToast(res.message || 'Gagal menyimpan', 'error'); }
    } catch(e) { showToast('Gagal terhubung server', 'error'); }
    btn.disabled = false; btn.textContent = 'SIMPAN';
  }

  async function deleteMerch(id) {
    if (!confirm('Yakin ingin menghapus item ini dari gudang?')) return;
    try {
      const res = await apiPost({ action: 'deleteMerchandise', id });
      if (res.success) { showToast('Item berhasil dihapus', 'success'); loadMerchandise(); } 
      else { showToast(res.message || 'Gagal menghapus', 'error'); }
    } catch(e) { showToast('Gagal terhubung server', 'error'); }
  }

  async function apiGet(action) { const res = await fetch(`${API_URL}?action=${action}`, { redirect: 'follow' }); return JSON.parse(await res.text()); }
  async function apiPost(body) { const res = await fetch(API_URL, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(body) }); return JSON.parse(await res.text()); }
  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const icons = { success: '✓', error: '✕', info: 'ℹ' };
    const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.innerHTML = `<span>${icons[type]}</span> ${msg}`;
    container.appendChild(toast); setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3500);
  }
</script>
</body>
</html>
