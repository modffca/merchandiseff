<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchandise Free Fire Lantai 23</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       DESIGN TOKENS - Cyber-Light Peach/Pink Theme
    ============================================= */
    :root {
      --bg:        #FFF5F8; /* Light warm background */
      --surface:   #FFFFFF;
      --surface2:  #FFEABB; /* Pale yellow accent */
      --border:    #FBC3C1; /* Peachy border */
      --border2:   #FAACBF;
      --accent:    #FE81D4; /* Vibrant Pink */
      --accent2:   #e560b8;
      --text:      #1A1114; /* Dark peachy-black */
      --text-muted:#6B5A5F;
      --danger:    #FF4D4F;
      --warning:   #FAAD14;
      --success:   #FE81D4; /* Using pink as the 'active/available' color */
      
      --radius:    0px; /* Sharp geometric edges for Cyberpunk feel */
      --radius-sm: 0px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow:    4px 4px 0px #FBC3C1; /* Hard offset shadow */
      --shadow-hover: 8px 8px 0px #FE81D4;
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 20px 20px; /* Dotted grid background */
    }

    /* =============================================
       NAVBAR
    ============================================= */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      height: 70px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--text);
    }
    .navbar-brand {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      display: flex; align-items: center; gap: 10px;
      text-transform: uppercase;
    }
    .navbar-brand span {
      display: inline-block;
      width: 14px; height: 14px;
      background: var(--accent);
      border: 2px solid var(--text);
    }
    .navbar-actions { display: flex; align-items: center; gap: 16px; }
    
    .navbar-user {
      cursor: pointer;
      transition: transform 0.2s;
    }
    .navbar-user:hover { transform: scale(1.05); }
    .navbar-user .avatar {
      width: 40px; height: 40px;
      background: var(--surface2);
      border: 2px solid var(--text);
      box-shadow: 2px 2px 0px var(--text);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 16px;
      color: var(--text);
    }

    /* =============================================
       BUTTONS
    ============================================= */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 24px;
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border: 2px solid var(--text);
      transition: all 0.2s ease;
      background: var(--surface);
      color: var(--text);
      box-shadow: 3px 3px 0px var(--border);
    }
    .btn-primary {
      background: var(--accent);
      box-shadow: 3px 3px 0px var(--text);
    }
    .btn-primary:hover {
      background: var(--accent2);
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0px var(--text);
    }
    .btn-ghost:hover {
      background: var(--surface2);
      box-shadow: 3px 3px 0px var(--text);
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }

    /* =============================================
       PAGES
    ============================================= */
    .page { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    /* =============================================
       AUTH PAGE
    ============================================= */
    .auth-page {
      min-height: calc(100vh - 70px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 2px solid var(--text);
      padding: 40px;
      box-shadow: 8px 8px 0px var(--border2);
    }
    .auth-header { margin-bottom: 30px; text-align: center; }
    .auth-header h2 { font-family: var(--font-head); font-size: 28px; font-weight: 800; text-transform: uppercase; }
    .auth-tabs { display: flex; border: 2px solid var(--text); margin-bottom: 24px; }
    .auth-tab {
      flex: 1; text-align: center; padding: 12px;
      font-family: var(--font-head); font-weight: 800; font-size: 14px; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
      background: var(--surface);
    }
    .auth-tab:first-child { border-right: 2px solid var(--text); }
    .auth-tab.active { background: var(--surface2); }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; text-transform: uppercase; }
    .form-input {
      width: 100%; padding: 12px;
      background: var(--bg); border: 2px solid var(--text);
      font-family: var(--font-body); font-size: 15px; color: var(--text);
      outline: none; transition: box-shadow 0.2s;
    }
    .form-input:focus { box-shadow: 3px 3px 0px var(--accent); }
    .form-btn { width: 100%; margin-top: 10px; padding: 14px; font-size: 16px; }

    /* =============================================
       DASHBOARD PAGE
    ============================================= */
    .dashboard-page { padding: 40px 32px 80px; max-width: 1300px; margin: 0 auto; }

    .hero {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 40px; flex-wrap: wrap; gap: 20px;
    }
    .hero h1 {
      font-family: var(--font-head);
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 3px 3px 0px var(--border2);
    }
    .hero-stats { display: flex; gap: 12px; }
    .stat-chip {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px;
      background: var(--text); color: var(--surface);
      font-family: var(--font-head); font-weight: 800; text-transform: uppercase;
      box-shadow: 3px 3px 0px var(--border);
    }
    .stat-chip .val { color: var(--accent); font-size: 18px; }

    /* TOOLBAR */
    .toolbar {
      display: flex; gap: 12px; margin-bottom: 32px;
    }
    .search-box {
      flex: 1; display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 2px solid var(--text);
      padding: 0 16px; box-shadow: 3px 3px 0px var(--border);
    }
    .search-box input {
      width: 100%; padding: 14px 0; border: none; outline: none; background: transparent;
      font-family: var(--font-body); font-size: 15px; font-weight: 500;
    }
    .filter-select, .sort-select {
      padding: 0 16px; background: var(--surface); border: 2px solid var(--text);
      font-family: var(--font-head); font-weight: 800; text-transform: uppercase; font-size: 13px;
      outline: none; cursor: pointer; box-shadow: 3px 3px 0px var(--border);
    }

    /* GRID & CARDS */
    .merch-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px;
    }
    .merch-card {
      background: var(--surface);
      border: 2px solid var(--text);
      display: flex; flex-direction: column;
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
    }
    .merch-card:hover {
      transform: translateY(-4px) translate(-4px, -4px);
      box-shadow: var(--shadow-hover);
    }
    .merch-img {
      width: 100%; aspect-ratio: 1 / 1;
      background: var(--surface2);
      border-bottom: 2px solid var(--text);
      position: relative;
    }
    .merch-img img { width: 100%; height: 100%; object-fit: cover; }
    .merch-img-placeholder {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: var(--border2);
    }
    .merch-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
    .merch-name {
      font-family: var(--font-head); font-size: 18px; font-weight: 800;
      text-transform: uppercase; margin-bottom: auto; padding-bottom: 16px;
      line-height: 1.2;
    }
    .merch-meta {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 16px; border-top: 2px dashed var(--border2);
    }
    .merch-stock {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-head); font-size: 13px; font-weight: 800;
      background: var(--bg); padding: 4px 10px; border: 1px solid var(--text);
    }
    .merch-stock .dot { width: 8px; height: 8px; border: 1px solid var(--text); }
    .stock-ok .dot { background: var(--success); }
    .stock-low .dot { background: var(--warning); }
    .stock-empty .dot { background: var(--danger); }
    .merch-note {
      font-size: 12px; color: var(--text-muted); font-weight: 500;
      margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
    }

    /* EMPTY / LOADING STATE */
    .empty-state {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
      border: 2px dashed var(--text); background: var(--surface);
    }
    .empty-state h3 { font-family: var(--font-head); font-size: 20px; text-transform: uppercase; margin-bottom: 8px; }

    .loading-grid .skeleton {
      background: var(--surface); border: 2px solid var(--border2); height: 380px;
      animation: pulse 1.5s infinite alternate;
    }
    @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; background: var(--surface2); } }

    /* =============================================
       TOAST
    ============================================= */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      padding: 16px 24px; background: var(--surface); border: 2px solid var(--text);
      font-family: var(--font-head); font-weight: 800; font-size: 13px; text-transform: uppercase;
      box-shadow: 4px 4px 0px var(--text); display: flex; align-items: center; gap: 12px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: none; } }

    @media (max-width: 768px) {
      .navbar { padding: 0 20px; }
      .dashboard-page { padding: 20px 20px 80px; }
      .toolbar { flex-direction: column; }
      .hero { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>
<body>

<div id="app">
  <nav class="navbar">
    <div class="navbar-brand"><span></span> MerchSpace</div>
    <div class="navbar-actions" id="navbar-actions">
      </div>
  </nav>

  <div class="page active" id="page-auth">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <h2 id="auth-title">Masuk</h2>
        </div>
        <div class="auth-tabs">
          <div class="auth-tab active" onclick="switchAuthTab('login')">Masuk</div>
          <div class="auth-tab" onclick="switchAuthTab('register')">Daftar</div>
        </div>

        <div id="form-login">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="login-email" placeholder="nama@email.com" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="login-password" placeholder="••••••••" />
          </div>
          <button class="btn btn-primary form-btn" onclick="handleLogin()" id="btn-login">LOGIN</button>
        </div>

        <div id="form-register" style="display:none">
          <div class="form-group">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-input" id="reg-nama" placeholder="Nama kamu" />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="reg-email" placeholder="nama@email.com" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="reg-password" placeholder="Min. 6 karakter" />
          </div>
          <button class="btn btn-primary form-btn" onclick="handleRegister()" id="btn-register">REGISTER</button>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="page-dashboard">
    <div class="dashboard-page">
      <div class="hero">
        <h1>Merchandise Free Fire Lantai 23</h1>
        <div class="hero-stats">
          <div class="stat-chip"><span class="lbl">TOTAL</span> <span class="val" id="stat-total">0</span></div>
          <div class="stat-chip"><span class="lbl">READY</span> <span class="val" id="stat-available">0</span></div>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="search-input" placeholder="CARI MERCHANDISE..." oninput="applyFilters()" />
        </div>
        <select class="filter-select" id="filter-jenis" onchange="applyFilters()">
          <option value="">SEMUA JENIS</option>
        </select>
        <select class="sort-select" id="sort-by" onchange="applyFilters()">
          <option value="newest">TERBARU</option>
          <option value="name-asc">NAMA A-Z</option>
          <option value="name-desc">NAMA Z-A</option>
        </select>
      </div>

      <div class="loading-grid merch-grid" id="loading-state">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      </div>

      <div class="merch-grid" id="merch-grid" style="display:none"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
  // =============================================
  // CONFIG - KONEKSI LANGSUNG KE APPS SCRIPT
  // =============================================
  const API_URL = 'https://script.google.com/macros/s/AKfycbye8KOyKjzVmqTeEJWENdcfemRSNDPIcho1JzX02Gh2_lQhgmL4JnLbAuHLfg_udAT5/exec';

  let currentUser = null;
  let allMerchandise = [];

  document.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('merch_user');
    if (saved) {
      currentUser = JSON.parse(saved);
      goToDashboard();
    } else {
      showPage('auth');
    }
  });

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
  }

  function goToDashboard() {
    showPage('dashboard');
    renderNavbar();
    loadMerchandise();
  }

  function renderNavbar() {
    const el = document.getElementById('navbar-actions');
    if (currentUser) {
      const initial = currentUser.nama.charAt(0).toUpperCase();
      el.innerHTML = `
        <div class="navbar-user" title="Keluar" onclick="handleLogout()">
          <div class="avatar">${initial}</div>
        </div>
      `;
    } else {
      el.innerHTML = `<button class="btn btn-primary" onclick="showPage('auth')">MASUK</button>`;
    }
  }

  function switchAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    const idx = tab === 'login' ? 0 : 1;
    document.querySelectorAll('.auth-tab')[idx].classList.add('active');
    document.getElementById('form-login').style.display    = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('auth-title').textContent      = tab === 'login' ? 'Masuk' : 'Daftar';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showToast('Isi email dan password!', 'error'); return; }

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'MEMPROSES...';

    try {
      const res = await apiPost({ action: 'login', email, password });
      if (res.success) {
        currentUser = res.user;
        localStorage.setItem('merch_user', JSON.stringify(currentUser));
        showToast('Login Sukses', 'success');
        goToDashboard();
      } else { showToast(res.message, 'error'); }
    } catch (e) { showToast('Koneksi Gagal', 'error'); }
    btn.disabled = false; btn.textContent = 'LOGIN';
  }

  async function handleRegister() {
    const nama = document.getElementById('reg-nama').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    if (!nama || !email || !password) { showToast('Lengkapi data!', 'error'); return; }

    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = 'MEMPROSES...';

    try {
      const res = await apiPost({ action: 'register', nama, email, password });
      if (res.success) {
        showToast('Akun dibuat! Silakan login.', 'success');
        switchAuthTab('login');
      } else { showToast(res.message, 'error'); }
    } catch (e) { showToast('Koneksi Gagal', 'error'); }
    btn.disabled = false; btn.textContent = 'REGISTER';
  }

  function handleLogout() {
    currentUser = null; localStorage.removeItem('merch_user');
    showPage('auth'); renderNavbar();
  }

  async function loadMerchandise() {
    document.getElementById('loading-state').style.display = 'grid';
    document.getElementById('merch-grid').style.display    = 'none';
    try {
      const res = await apiGet('getMerchandise');
      if (res.success) {
        allMerchandise = res.data || [];
        populateJenisFilter(allMerchandise);
        updateStats(allMerchandise);
        applyFilters();
      } else { showToast('Gagal memuat data', 'error'); }
    } catch (e) { showToast('Koneksi ke API gagal', 'error'); }
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('merch-grid').style.display    = 'grid';
  }

  function populateJenisFilter(items) {
    const jenis = [...new Set(items.map(i => i.jenis).filter(Boolean))].sort();
    const sel = document.getElementById('filter-jenis');
    sel.innerHTML = '<option value="">SEMUA JENIS</option>';
    jenis.forEach(j => {
      const opt = document.createElement('option');
      opt.value = j; opt.textContent = j.toUpperCase();
      sel.appendChild(opt);
    });
  }

  function updateStats(items) {
    document.getElementById('stat-total').textContent = items.length;
    document.getElementById('stat-available').textContent = items.filter(i => parseInt(i.qty) > 0).length;
  }

  function applyFilters() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const jenis = document.getElementById('filter-jenis').value;
    const sortBy = document.getElementById('sort-by').value;

    let filtered = allMerchandise.filter(item => {
      const matchSearch = !q || item.nama?.toLowerCase().includes(q) || item.jenis?.toLowerCase().includes(q);
      const matchJenis = !jenis || item.jenis === jenis;
      return matchSearch && matchJenis;
    });

    filtered = [...filtered].sort((a, b) => {
      if (sortBy === 'name-asc') return (a.nama || '').localeCompare(b.nama || '');
      if (sortBy === 'name-desc') return (b.nama || '').localeCompare(a.nama || '');
      return new Date(b.last_update || 0) - new Date(a.last_update || 0);
    });
    renderGrid(filtered);
  }

  function renderGrid(items) {
    const grid = document.getElementById('merch-grid');
    if (items.length === 0) {
      grid.innerHTML = `<div class="empty-state"><h3>KOSONG</h3><p>Tidak ada barang yang cocok.</p></div>`;
      return;
    }
    grid.innerHTML = items.map(item => {
      const qty = parseInt(item.qty) || 0;
      const stockCls = qty === 0 ? 'stock-empty' : qty <= 5 ? 'stock-low' : 'stock-ok';
      const imgHtml = item.foto_url 
        ? `<img src="${item.foto_url}" loading="lazy" alt="${item.nama}" onerror="this.parentElement.innerHTML='<div class=\\'merch-img-placeholder\\'>📦</div>'" />` 
        : `<div class="merch-img-placeholder">📦</div>`;

      return `
        <div class="merch-card">
          <div class="merch-img">${imgHtml}</div>
          <div class="merch-body">
            <div class="merch-name">${item.nama || 'TANPA NAMA'}</div>
            <div class="merch-meta">
              <div class="merch-stock ${stockCls}">
                <div class="dot"></div> ${qty} UNIT
              </div>
            </div>
            ${item.note ? `<div class="merch-note">${item.note}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  async function apiGet(action) {
    const url = `${API_URL}?action=${action}`;
    const res = await fetch(url, { redirect: 'follow' });
    return JSON.parse(await res.text());
  }

  async function apiPost(body) {
    const res = await fetch(API_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    });
    return JSON.parse(await res.text());
  }

  function showToast(msg, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${type === 'success' ? '✔' : '⚠'}</span> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
  }
</script>
</body>
</html>
